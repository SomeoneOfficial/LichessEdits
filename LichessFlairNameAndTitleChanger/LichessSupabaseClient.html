<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lichess Changes Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-a: #eff6ff;
      --bg-b: #fef7e9;
      --panel: #ffffffcc;
      --panel-solid: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --line: #d6d3d1;
      --accent: #0f766e;
      --accent-2: #0ea5e9;
      --danger: #dc2626;
      --shadow: 0 10px 40px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 90% -10%, #bae6fd 0%, transparent 30%),
        radial-gradient(circle at -10% 10%, #bbf7d0 0%, transparent 28%),
        linear-gradient(130deg, var(--bg-a), var(--bg-b));
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(8px);
      border: 1px solid #ffffff;
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px;
      animation: rise 320ms ease;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    input,
    textarea,
    button,
    select {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel-solid);
      color: var(--text);
      padding: 10px 12px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .row {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    button {
      cursor: pointer;
      border: 0;
      font-weight: 600;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: white;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    button.secondary {
      background: #475569;
    }

    button.danger {
      background: var(--danger);
    }

    .status {
      padding: 10px 12px;
      border-radius: 10px;
      background: #ecfeff;
      border: 1px solid #a5f3fc;
      color: #164e63;
      font-size: 0.92rem;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tr:hover {
      background: #f8fafc;
      cursor: pointer;
    }

    .table-wrap {
      overflow: auto;
      max-height: 380px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    #logBox {
      background: #0f172a;
      color: #d1fae5;
      border-radius: 10px;
      padding: 12px;
      max-height: 240px;
      overflow: auto;
      margin: 0;
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .full {
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h2>Connection + Login</h2>
      <div id="authStatus" class="status">Not connected</div>

      <label>
        Supabase URL
        <input id="supabaseUrl" value="https://wkhbvgqvafooneuwhppj.supabase.co" />
      </label>

      <label>
        Table Name
        <input id="tableName" value="LichessChangesDB" />
      </label>

      <label>
        Publishable / Anon Key
        <input id="anonKey" placeholder="sb_publishable_..." />
      </label>

      <div class="btn-row">
        <button id="connectBtn" type="button">Connect</button>
      </div>

      <div class="row">
        <label>
          Email
          <input id="email" type="email" placeholder="you@example.com" />
        </label>
        <label>
          Password
          <input id="password" type="password" placeholder="********" />
        </label>
      </div>

      <div class="btn-row">
        <button id="loginBtn" type="button">Login</button>
        <button id="logoutBtn" class="secondary" type="button">Logout</button>
      </div>
    </section>

    <section class="panel">
      <h2>Column Mapping</h2>
      <div class="row">
        <label>Key Column<input id="keyColumn" value="username" /></label>
        <label>Display Name Column<input id="displayColumn" value="display_name" /></label>
      </div>
      <div class="row">
        <label>Title Column<input id="titleColumn" value="title" /></label>
        <label>Flair Column<input id="flairColumn" value="flair" /></label>
      </div>
      <div class="row">
        <label>Enabled Column<input id="enabledColumn" value="enabled" /></label>
        <label>Row Limit<input id="rowLimit" type="number" min="1" max="2000" value="200" /></label>
      </div>
      <div class="btn-row">
        <button id="refreshBtn" type="button">Refresh Rows</button>
      </div>
    </section>

    <section class="panel full">
      <h2>Row Editor</h2>
      <div class="row">
        <label>
          Username / Key Value
          <input id="keyValue" placeholder="AJisland" />
        </label>
        <label>
          Display Name
          <input id="displayValue" placeholder="AJisland" />
        </label>
      </div>

      <div class="row">
        <label>
          Title
          <input id="titleValue" placeholder="GM" />
        </label>
        <label>
          Flair URL
          <input id="flairValue" placeholder="https://...gif" />
        </label>
      </div>

      <label class="check">
        <input id="enabledValue" type="checkbox" checked />
        Row enabled
      </label>

      <label>
        Extra fields JSON (optional)
        <textarea id="extraJson" placeholder='{"custom_field":"value"}'></textarea>
      </label>

      <div class="btn-row">
        <button id="saveBtn" type="button">Upsert Row</button>
        <button id="deleteBtn" class="danger" type="button">Delete Row</button>
        <button id="clearBtn" class="secondary" type="button">Clear Form</button>
      </div>
    </section>

    <section class="panel full">
      <h2>Rows</h2>
      <div class="table-wrap">
        <table>
          <thead id="rowsHead"></thead>
          <tbody id="rowsBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel full">
      <h2>Activity Log</h2>
      <pre id="logBox"></pre>
    </section>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const state = {
      client: null,
      rows: []
    };

    const el = {
      supabaseUrl: document.getElementById("supabaseUrl"),
      tableName: document.getElementById("tableName"),
      anonKey: document.getElementById("anonKey"),
      email: document.getElementById("email"),
      password: document.getElementById("password"),
      authStatus: document.getElementById("authStatus"),
      keyColumn: document.getElementById("keyColumn"),
      displayColumn: document.getElementById("displayColumn"),
      titleColumn: document.getElementById("titleColumn"),
      flairColumn: document.getElementById("flairColumn"),
      enabledColumn: document.getElementById("enabledColumn"),
      rowLimit: document.getElementById("rowLimit"),
      keyValue: document.getElementById("keyValue"),
      displayValue: document.getElementById("displayValue"),
      titleValue: document.getElementById("titleValue"),
      flairValue: document.getElementById("flairValue"),
      enabledValue: document.getElementById("enabledValue"),
      extraJson: document.getElementById("extraJson"),
      rowsHead: document.getElementById("rowsHead"),
      rowsBody: document.getElementById("rowsBody"),
      logBox: document.getElementById("logBox")
    };

    function now() {
      return new Date().toLocaleString();
    }

    function log(message, detail) {
      const line = `[${now()}] ${message}${detail ? ` | ${detail}` : ""}`;
      el.logBox.textContent += `${line}\n`;
      el.logBox.scrollTop = el.logBox.scrollHeight;
    }

    function tableName() {
      return el.tableName.value.trim();
    }

    function getMappings() {
      return {
        key: el.keyColumn.value.trim(),
        display: el.displayColumn.value.trim(),
        title: el.titleColumn.value.trim(),
        flair: el.flairColumn.value.trim(),
        enabled: el.enabledColumn.value.trim()
      };
    }

    function connected() {
      return Boolean(state.client);
    }

    function setAuthStatus(text, isGood = false) {
      el.authStatus.textContent = text;
      el.authStatus.style.background = isGood ? "#ecfdf5" : "#ecfeff";
      el.authStatus.style.borderColor = isGood ? "#86efac" : "#a5f3fc";
      el.authStatus.style.color = isGood ? "#166534" : "#164e63";
    }

    function initClient() {
      const url = el.supabaseUrl.value.trim();
      const key = el.anonKey.value.trim();
      if (!url || !key) {
        throw new Error("Supabase URL and Publishable/Anon key are required.");
      }
      state.client = createClient(url, key);
      log("Client connected", `${url} | table ${tableName()}`);
    }

    function renderRows() {
      const rows = state.rows;
      const mappings = getMappings();

      const preferred = [
        mappings.key,
        mappings.display,
        mappings.title,
        mappings.flair,
        mappings.enabled,
        "id",
        "updated_at"
      ];

      const allKeys = Array.from(
        rows.reduce((set, row) => {
          Object.keys(row).forEach((k) => set.add(k));
          return set;
        }, new Set())
      );

      const cols = [...new Set([...preferred.filter(Boolean), ...allKeys])].slice(0, 12);

      el.rowsHead.innerHTML = `<tr>${cols.map((c) => `<th>${c}</th>`).join("")}</tr>`;
      el.rowsBody.innerHTML = rows
        .map((row, i) => {
          return `<tr data-row-index="${i}">${cols
            .map((c) => `<td title="${String(row[c] ?? "")}">${String(row[c] ?? "")}</td>`)
            .join("")}</tr>`;
        })
        .join("");

      el.rowsBody.querySelectorAll("tr").forEach((tr) => {
        tr.addEventListener("click", () => {
          const idx = Number(tr.dataset.rowIndex);
          populateFormFromRow(state.rows[idx]);
        });
      });
    }

    function populateFormFromRow(row) {
      const mappings = getMappings();
      el.keyValue.value = String(row[mappings.key] ?? "");
      el.displayValue.value = String(row[mappings.display] ?? "");
      el.titleValue.value = String(row[mappings.title] ?? "");
      el.flairValue.value = String(row[mappings.flair] ?? "");
      el.enabledValue.checked = Boolean(row[mappings.enabled] ?? true);

      const known = new Set([mappings.key, mappings.display, mappings.title, mappings.flair, mappings.enabled]);
      const extra = Object.fromEntries(Object.entries(row).filter(([k]) => !known.has(k)));
      el.extraJson.value = Object.keys(extra).length ? JSON.stringify(extra, null, 2) : "";
      log("Loaded row into editor", String(row[mappings.key] ?? ""));
    }

    function clearForm() {
      el.keyValue.value = "";
      el.displayValue.value = "";
      el.titleValue.value = "";
      el.flairValue.value = "";
      el.enabledValue.checked = true;
      el.extraJson.value = "";
    }

    async function refreshRows() {
      if (!connected()) {
        initClient();
      }

      const limit = Number(el.rowLimit.value) || 200;
      const table = tableName();

      const { data, error } = await state.client
        .from(table)
        .select("*")
        .limit(limit);

      if (error) {
        throw error;
      }

      state.rows = data || [];
      renderRows();
      log("Rows refreshed", `count ${state.rows.length}`);
    }

    async function upsertRow() {
      if (!connected()) {
        initClient();
      }

      const mappings = getMappings();
      if (!mappings.key) {
        throw new Error("Key Column is required.");
      }

      const keyValue = el.keyValue.value.trim();
      if (!keyValue) {
        throw new Error("Username / Key Value is required.");
      }

      const payload = {
        [mappings.key]: keyValue,
        [mappings.display]: el.displayValue.value.trim(),
        [mappings.title]: el.titleValue.value.trim(),
        [mappings.flair]: el.flairValue.value.trim(),
        [mappings.enabled]: el.enabledValue.checked
      };

      const extraRaw = el.extraJson.value.trim();
      if (extraRaw) {
        let extra;
        try {
          extra = JSON.parse(extraRaw);
        } catch {
          throw new Error("Extra fields JSON is invalid.");
        }
        Object.assign(payload, extra);
      }

      const table = tableName();
      const { error } = await state.client
        .from(table)
        .upsert(payload, { onConflict: mappings.key })
        .select();

      if (error) {
        throw error;
      }

      log("Row upserted", `${mappings.key}=${keyValue}`);
      await refreshRows();
    }

    async function deleteRow() {
      if (!connected()) {
        initClient();
      }

      const mappings = getMappings();
      const keyValue = el.keyValue.value.trim();
      if (!mappings.key || !keyValue) {
        throw new Error("Key Column and Username / Key Value are required for delete.");
      }

      const table = tableName();
      const { error } = await state.client
        .from(table)
        .delete()
        .eq(mappings.key, keyValue);

      if (error) {
        throw error;
      }

      log("Row deleted", `${mappings.key}=${keyValue}`);
      await refreshRows();
    }

    async function login() {
      if (!connected()) {
        initClient();
      }

      const email = el.email.value.trim();
      const password = el.password.value;
      if (!email || !password) {
        throw new Error("Email and password are required.");
      }

      const { data, error } = await state.client.auth.signInWithPassword({ email, password });
      if (error) throw error;

      setAuthStatus(`Logged in as ${data.user?.email || "unknown"}`, true);
      log("Login success", data.user?.email || "unknown");
      await refreshRows();
    }

    async function logout() {
      if (!connected()) return;
      const { error } = await state.client.auth.signOut();
      if (error) throw error;
      setAuthStatus("Logged out");
      log("Logged out");
    }

    function bindButton(id, fn) {
      document.getElementById(id).addEventListener("click", async () => {
        try {
          await fn();
        } catch (err) {
          const message = err?.message || String(err);
          log("Error", message);
          setAuthStatus(message, false);
        }
      });
    }

    bindButton("connectBtn", async () => {
      initClient();
      const { data, error } = await state.client.auth.getSession();
      if (error) throw error;
      if (data.session?.user?.email) {
        setAuthStatus(`Connected. Session: ${data.session.user.email}`, true);
      } else {
        setAuthStatus("Connected. No active session.");
      }
    });

    bindButton("loginBtn", login);
    bindButton("logoutBtn", logout);
    bindButton("refreshBtn", refreshRows);
    bindButton("saveBtn", upsertRow);
    bindButton("deleteBtn", deleteRow);
    bindButton("clearBtn", async () => {
      clearForm();
      log("Form cleared");
    });

    log("Ready", "Enter key, connect, then login.");
  </script>
</body>
</html>
